<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lysulin — Blood Sugar Support</title>
  <meta name="description" content="Lysulin combines clinically studied, patented ingredients to help maintain healthy blood sugar levels and support metabolic health." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:opsz@9..40&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-logo" aria-label="Lysulin home">
        <div class="logo-mark">L</div>
        <span class="logo-text">Lysulin<sup>®</sup></span>
      </a>

      <nav class="nav-links" aria-label="Main navigation">
        <a href="#how-it-works">How It Works</a>
        <a href="#ingredients">Ingredients</a>
        <a href="#shop">Shop</a>
        <a href="#science">Science</a>
        <a href="#reviews">Reviews</a>
      </nav>

      <a href="https://lysulin.com/lysulin-supplements/" target="_blank" rel="noopener noreferrer" class="btn btn-primary nav-cta">Shop Now</a>

      <button class="nav-hamburger" aria-label="Open menu" aria-expanded="false" onclick="toggleMenu(this)">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
      <a href="#how-it-works" onclick="closeMenu()">How It Works</a>
      <a href="#ingredients" onclick="closeMenu()">Ingredients</a>
      <a href="#shop" onclick="closeMenu()">Shop</a>
      <a href="#science" onclick="closeMenu()">Science</a>
      <a href="#reviews" onclick="closeMenu()">Reviews</a>
      <a href="https://lysulin.com/lysulin-supplements/" target="_blank" rel="noopener noreferrer" class="btn btn-primary" style="margin-top:8px" onclick="closeMenu()">Shop Now</a>
    </div>
  </header>

  <!-- WIREFRAME IMAGE (pixel-perfect design) with working buttons -->
  <main class="page">
    <section class="wireframe-shell" aria-label="Lysulin landing page">
      <img
        class="wireframe-image"
        src="images/lysulin-wireframe-full.png"
        alt="Lysulin landing page showing blood sugar instability support, symptom cards, evidence-based formula section, and science-driven ingredients."
        width="1365"
        height="2048"
      />

      <!-- Clickable hotspots over the wireframe buttons -->
      <div class="hotspots" aria-hidden="false">
        <a class="hotspot shop-now"     href="https://lysulin.com/lysulin-supplements/" target="_blank" rel="noopener noreferrer" aria-label="Shop Now"></a>
        <a class="hotspot how-it-works" href="https://lysulin.com/" target="_blank" rel="noopener noreferrer" aria-label="How It Works"></a>
      </div>
    </section>
  </main>

  <script>
    window.addEventListener('scroll', () => {
      document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 20);
    });
    function toggleMenu(btn) {
      const menu = document.getElementById('mobile-menu');
      const open = menu.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
      menu.setAttribute('aria-hidden', String(!open));
    }
    function closeMenu() {
      document.getElementById('mobile-menu').classList.remove('open');
      document.querySelector('.nav-hamburger').setAttribute('aria-expanded', 'false');
    }
  </script>
</body>
</html>
